<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FindMyTabs &#x2014; Rules</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e; color: #cdd6f4;
      padding: 28px; max-width: 640px; margin: 0 auto; font-size: 13px;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    h2 { font-size: 11px; color: #a6adc8; margin-bottom: 10px; font-weight: 600;
         text-transform: uppercase; letter-spacing: 0.5px; }
    .section { margin-bottom: 32px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; color: #6c7086; font-size: 10px; padding: 6px 8px;
         text-transform: uppercase; letter-spacing: 0.4px; }
    td { padding: 7px 8px; border-top: 1px solid #313244; font-size: 12px; }
    .add-form { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    select, input {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 5px; padding: 6px 10px; font-size: 12px;
      font-family: inherit; outline: none;
    }
    select:focus, input:focus { border-color: #89b4fa; }
    .input-pattern  { flex: 1; min-width: 140px; }
    .input-category { width: 110px; }
    button {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      border-radius: 5px; padding: 6px 14px; font-size: 12px;
      cursor: pointer; font-family: inherit;
    }
    button:hover { background: #45475a; }
    .btn-delete { background: none; border: none; color: #f38ba8;
                  cursor: pointer; font-size: 12px; padding: 0; }
    .btn-delete:hover { color: #eba0ac; }
    .saved { color: #a6e3a1; font-size: 11px; margin-left: 8px; display: none; }
    .muted { color: #6c7086; }
    .empty-note { color: #6c7086; font-size: 12px; padding: 10px 8px; }
  </style>
</head>
<body>
  <h1>FindMyTabs &#x2014; Custom Rules</h1>

  <div class="section">
    <h2>Your Rules <span class="saved" id="saved-msg">&#x2713; Saved</span></h2>
    <table>
      <thead>
        <tr>
          <th>Match type</th><th>Pattern</th><th>Category</th><th></th>
        </tr>
      </thead>
      <tbody id="rules-list"></tbody>
    </table>
    <div class="add-form">
      <select id="new-match">
        <option value="url">URL contains</option>
        <option value="title">Title contains</option>
      </select>
      <input id="new-pattern"  class="input-pattern"  type="text" placeholder="e.g. mycompany.com">
      <input id="new-category" class="input-category" type="text" placeholder="Category">
      <button id="btn-add">Add rule</button>
    </div>
  </div>

  <div class="section">
    <h2>Built-in Rules <span class="muted">(read-only)</span></h2>
    <table>
      <thead>
        <tr><th>Match type</th><th>Pattern</th><th>Category</th></tr>
      </thead>
      <tbody id="builtin-list"></tbody>
    </table>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
