<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FindMyTabs</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <div class="sponsor-banner">
      <span>&#x2764; FindMyTabs is free &amp; open source &mdash; if it saves your sanity,</span>
      <a href="https://github.com/sponsors/pankumawat" target="_blank" class="sponsor-link">sponsor the creator</a>
      <span>&#x1F64F;</span>
    </div>
    <div class="search-bar">
      <span class="search-icon">&#x1F50D;</span>
      <input type="text" id="search" placeholder="Search tabs..." autocomplete="off" autofocus>
      <span class="shortcut-hint">&#x2303;&#x21E7;F</span>
    </div>
    <div id="pills" class="pills"></div>
    <div class="actions">
      <button id="btn-group" class="btn">&#x229E; Group tabs</button>
      <button id="btn-dedup" class="btn">&#x2716; Close duplicates</button>
      <button id="btn-rules" class="btn">&#x2699; Rules</button>
    </div>
    <div id="tab-list" class="tab-list"></div>
    <div id="recently-closed" class="recently-closed"></div>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
